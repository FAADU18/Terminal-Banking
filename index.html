<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Banking Application</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        .container {
            width: 100%;
            max-width: 1000px;
            padding: 20px;
        }

        .card {
            background: white;
            border-radius: 10px;
            box-shadow: 0 10px 40px rgba(0, 0, 0, 0.2);
            padding: 40px;
        }

        .header {
            text-align: center;
            margin-bottom: 30px;
        }

        .header h1 {
            color: #333;
            font-size: 28px;
            margin-bottom: 10px;
        }

        .header p {
            color: #666;
            font-size: 14px;
        }

        .form-group {
            margin-bottom: 20px;
        }

        label {
            display: block;
            margin-bottom: 8px;
            color: #333;
            font-weight: 600;
        }

        input, select {
            width: 100%;
            padding: 12px;
            border: 1px solid #ddd;
            border-radius: 5px;
            font-size: 14px;
            transition: border-color 0.3s;
        }

        input:focus, select:focus {
            outline: none;
            border-color: #667eea;
            box-shadow: 0 0 0 3px rgba(102, 126, 234, 0.1);
        }

        .button-group {
            display: flex;
            gap: 10px;
            margin-top: 30px;
        }

        button {
            flex: 1;
            padding: 12px;
            border: none;
            border-radius: 5px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s;
            z-index: 100;
            position: relative;
        }

        button:disabled {
            opacity: 0.5;
            cursor: not-allowed;
        }

        .btn-primary {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
        }

        .btn-primary:hover {
            transform: translateY(-2px);
            box-shadow: 0 5px 20px rgba(102, 126, 234, 0.4);
        }

        .btn-secondary {
            background: #f0f0f0;
            color: #333;
        }

        .btn-secondary:hover {
            background: #e0e0e0;
        }

        .alert {
            padding: 12px 15px;
            border-radius: 5px;
            margin-bottom: 20px;
            display: none;
        }

        .alert.success {
            background: #d4edda;
            color: #155724;
            border: 1px solid #c3e6cb;
            display: block;
        }

        .alert.error {
            background: #f8d7da;
            color: #721c24;
            border: 1px solid #f5c6cb;
            display: block;
        }

        .hidden {
            display: none;
        }

        .dashboard {
            display: none;
        }

        .balance-card {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            padding: 30px;
            border-radius: 10px;
            margin-bottom: 30px;
        }

        .balance-card h2 {
            font-size: 14px;
            font-weight: 500;
            margin-bottom: 10px;
            opacity: 0.9;
        }

        .balance-card .amount {
            font-size: 32px;
            font-weight: 700;
        }

        .balance-card .account-info {
            margin-top: 20px;
            padding-top: 20px;
            border-top: 1px solid rgba(255, 255, 255, 0.2);
            font-size: 14px;
        }

        .stats {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 20px;
            margin-bottom: 30px;
        }

        .stat-box {
            background: #f8f9fa;
            padding: 20px;
            border-radius: 10px;
            border-left: 4px solid #667eea;
        }

        .stat-box h3 {
            font-size: 12px;
            color: #666;
            margin-bottom: 10px;
            text-transform: uppercase;
        }

        .stat-box .value {
            font-size: 20px;
            font-weight: 700;
            color: #333;
        }

        .section {
            margin-bottom: 30px;
        }

        .section-title {
            font-size: 18px;
            font-weight: 600;
            color: #333;
            margin-bottom: 15px;
            border-bottom: 2px solid #667eea;
            padding-bottom: 10px;
        }

        .transaction-list {
            max-height: 300px;
            overflow-y: auto;
        }

        .transaction-item {
            padding: 15px;
            border: 1px solid #eee;
            border-radius: 5px;
            margin-bottom: 10px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .transaction-item:hover {
            background: #f8f9fa;
        }

        .transaction-details h4 {
            font-size: 14px;
            color: #333;
            margin-bottom: 5px;
        }

        .transaction-details p {
            font-size: 12px;
            color: #666;
        }

        .transaction-amount {
            font-size: 16px;
            font-weight: 700;
        }

        .transaction-amount.debit {
            color: #dc3545;
        }

        .transaction-amount.credit {
            color: #28a745;
        }

        .logout-btn {
            background: #dc3545;
            color: white;
            padding: 10px 20px;
            border: none;
            border-radius: 5px;
            cursor: pointer;
            float: right;
            margin-bottom: 20px;
        }

        .logout-btn:hover {
            background: #c82333;
        }

        .tabs {
            display: flex;
            gap: 10px;
            margin-bottom: 20px;
            border-bottom: 2px solid #eee;
        }

        .tab-btn {
            background: none;
            border: none;
            padding: 10px 20px;
            font-size: 14px;
            font-weight: 600;
            color: #666;
            cursor: pointer;
            border-bottom: 3px solid transparent;
            transition: all 0.3s;
        }

        .tab-btn.active {
            color: #667eea;
            border-bottom-color: #667eea;
        }

        .tab-content {
            display: none;
        }

        .tab-content.active {
            display: block;
        }

        .form-row {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 15px;
        }

        @media (max-width: 600px) {
            .form-row {
                grid-template-columns: 1fr;
            }

            .button-group {
                flex-direction: column;
            }

            .balance-card .amount {
                font-size: 24px;
            }

            .card {
                padding: 20px;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="card">
            <!-- Login Form -->
            <div id="loginForm" class="login-form">
                <div class="header">
                    <h1>🏦 Banking Application</h1>
                    <p>Secure Online Banking</p>
                </div>

                <div id="alertBox" class="alert"></div>

                <div class="form-group">
                    <label for="loginEmail">Email</label>
                    <input type="email" id="loginEmail" placeholder="Enter your email">
                </div>

                <div class="form-group">
                    <label for="loginPassword">Password</label>
                    <input type="password" id="loginPassword" placeholder="Enter your password">
                </div>

                <div class="button-group">
                    <button class="btn-primary" onclick="login()">Login</button>
                    <button class="btn-secondary" onclick="showSignup()">Create Account</button>
                </div>

                <div style="margin-top: 20px; padding-top: 20px; border-top: 1px solid #eee; text-align: center; font-size: 12px; color: #666;">
                    <p><strong>Demo Account</strong></p>
                    <p>Email: demo@bank.com</p>
                    <p>Password: password123</p>
                </div>
            </div>

            <!-- Signup Form -->
            <div id="signupForm" class="hidden">
                <div class="header">
                    <h1>Create New Account</h1>
                    <p>Join our banking platform</p>
                </div>

                <div id="signupAlert" class="alert"></div>

                <div class="form-group">
                    <label for="signupName">Full Name</label>
                    <input type="text" id="signupName" placeholder="Enter your full name">
                </div>

                <div class="form-group">
                    <label for="signupEmail">Email</label>
                    <input type="email" id="signupEmail" placeholder="Enter your email">
                </div>

                <div class="form-group">
                    <label for="signupPassword">Password</label>
                    <input type="password" id="signupPassword" placeholder="Create a password">
                </div>

                <div class="button-group">
                    <button class="btn-primary" onclick="signup()">Create Account</button>
                    <button class="btn-secondary" onclick="showLogin()">Back to Login</button>
                </div>
            </div>

            <!-- Dashboard -->
            <div id="dashboard" class="dashboard">
                <button class="logout-btn" onclick="logout()">Logout</button>

                <div class="balance-card">
                    <h2>Account Balance</h2>
                    <div class="amount">$<span id="balanceAmount">0.00</span></div>
                    <div class="account-info">
                        <div>Account: <span id="dashboardAccNum">-</span></div>
                        <div>Name: <span id="dashboardName">-</span></div>
                    </div>
                </div>

                <div class="tabs">
                    <button class="tab-btn active" onclick="switchTab('transfer')">Transfer</button>
                    <button class="tab-btn" onclick="switchTab('deposit')">Deposit</button>
                    <button class="tab-btn" onclick="switchTab('withdraw')">Withdraw</button>
                    <button class="tab-btn" onclick="switchTab('transactions')">Transactions</button>
                </div>

                <!-- Transfer Tab -->
                <div id="transfer" class="tab-content active">
                    <div class="section">
                        <div class="section-title">Transfer Money</div>
                        <div class="form-group">
                            <label for="recipientAccount">Recipient Account Number</label>
                            <input type="text" id="recipientAccount" placeholder="Enter recipient account number">
                        </div>

                        <div class="form-group">
                            <label for="transferAmount">Amount</label>
                            <input type="number" id="transferAmount" placeholder="0.00" min="0" step="0.01">
                        </div>

                        <button class="btn-primary" onclick="transfer()">Send Money</button>
                    </div>
                </div>

                <!-- Deposit Tab -->
                <div id="deposit" class="tab-content">
                    <div class="section">
                        <div class="section-title">Deposit Funds</div>
                        <div class="form-group">
                            <label for="depositAmount">Amount to Deposit</label>
                            <input type="number" id="depositAmount" placeholder="0.00" min="0" step="0.01">
                        </div>

                        <button class="btn-primary" onclick="deposit()">Deposit</button>
                    </div>
                </div>

                <!-- Withdraw Tab -->
                <div id="withdraw" class="tab-content">
                    <div class="section">
                        <div class="section-title">Withdraw Funds</div>
                        <div class="form-group">
                            <label for="withdrawAmount">Amount to Withdraw</label>
                            <input type="number" id="withdrawAmount" placeholder="0.00" min="0" step="0.01">
                        </div>

                        <button class="btn-primary" onclick="withdraw()">Withdraw</button>
                    </div>
                </div>

                <!-- Transactions Tab -->
                <div id="transactions" class="tab-content">
                    <div class="section">
                        <div class="section-title">Recent Transactions</div>
                        <div id="transactionsList" class="transaction-list">
                            <p style="text-align: center; color: #999;">No transactions yet</p>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script>
        const API_BASE = 'http://localhost:5000/api';
        let currentUser = null;
        let token = localStorage.getItem('token');

        console.log('App initialized. Token present:', !!token);

        // Check API health on page load
        fetch(`${API_BASE}/health`)
            .then(r => r.json())
            .then(d => console.log('API Health:', d))
            .catch(e => console.error('API Connection Error:', e));

        if (token) {
            console.log('Token found, loading dashboard...');
            showDashboard();
            loadDashboard();
        } else {
            console.log('No token, showing login');
        }

        function showAlert(message, type = 'success', elementId = 'alertBox') {
            console.log(`[${type.toUpperCase()}] ${message}`);
            const alertBox = document.getElementById(elementId);
            alertBox.textContent = message;
            alertBox.className = `alert ${type}`;
            setTimeout(() => {
                alertBox.className = 'alert';
            }, 5000);
        }

        function showLogin() {
            document.getElementById('loginForm').classList.remove('hidden');
            document.getElementById('signupForm').classList.add('hidden');
        }

        function showSignup() {
            document.getElementById('loginForm').classList.add('hidden');
            document.getElementById('signupForm').classList.remove('hidden');
        }

        function showDashboard() {
            document.getElementById('loginForm').classList.add('hidden');
            document.getElementById('signupForm').classList.add('hidden');
            document.getElementById('dashboard').style.display = 'block';
        }

        async function login() {
            console.log('Login function called');
            const email = document.getElementById('loginEmail').value;
            const password = document.getElementById('loginPassword').value;

            if (!email || !password) {
                showAlert('Please fill in all fields', 'error');
                return;
            }

            try {
                const response = await fetch(`${API_BASE}/auth/login`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ email, password })
                });

                console.log('Login response status:', response.status);
                const data = await response.json();
                console.log('Login response:', data);

                if (!response.ok) {
                    showAlert(data.message || 'Login failed', 'error');
                    return;
                }

                token = data.token;
                currentUser = data.user;
                console.log('Login successful. User:', currentUser);
                console.log('Token:', token.substring(0, 20) + '...');
                
                localStorage.setItem('token', token);
                showAlert('Login successful!', 'success');
                
                setTimeout(() => {
                    showDashboard();
                    loadDashboard();
                }, 1000);
            } catch (error) {
                console.error('Login error:', error);
                showAlert('Network error: ' + error.message, 'error');
            }
        }

        async function signup() {
            const name = document.getElementById('signupName').value;
            const email = document.getElementById('signupEmail').value;
            const password = document.getElementById('signupPassword').value;

            if (!name || !email || !password) {
                showAlert('Please fill in all fields', 'error', 'signupAlert');
                return;
            }

            try {
                const response = await fetch(`${API_BASE}/auth/register`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ name, email, password })
                });

                const data = await response.json();

                if (!response.ok) {
                    showAlert(data.message || 'Signup failed', 'error', 'signupAlert');
                    return;
                }

                showAlert('Account created successfully! Account Number: ' + data.user.account_number, 'success', 'signupAlert');
                setTimeout(() => {
                    showLogin();
                    document.getElementById('loginEmail').value = email;
                }, 2000);
            } catch (error) {
                showAlert('Network error: ' + error.message, 'error', 'signupAlert');
            }
        }

        async function loadDashboard() {
            console.log('Loading dashboard...');
            if (!token) {
                console.error('No token available');
                showAlert('Please login first', 'error');
                return;
            }

            try {
                const response = await fetch(`${API_BASE}/dashboard`, {
                    headers: { 'Authorization': `Bearer ${token}` }
                });

                console.log('Dashboard response status:', response.status);
                const data = await response.json();
                console.log('Dashboard data:', data);

                if (!response.ok) {
                    showAlert(data.message || 'Failed to load dashboard', 'error');
                    return;
                }

                document.getElementById('balanceAmount').textContent = data.stats.balance.toFixed(2);
                if (currentUser) {
                    document.getElementById('dashboardAccNum').textContent = currentUser.account_number;
                    document.getElementById('dashboardName').textContent = currentUser.name;
                }
                
                // Store stats for display
                document.getElementById('creditsAmount').textContent = data.stats.credits.toFixed(2);
                document.getElementById('debitsAmount').textContent = data.stats.debits.toFixed(2);
                
                loadTransactionHistory();
            } catch (error) {
                console.error('Dashboard error:', error);
                showAlert('Error loading dashboard: ' + error.message, 'error');
            }
        }

        async function loadTransactionHistory() {
            try {
                const response = await fetch(`${API_BASE}/transactions/history`, {
                    headers: { 'Authorization': `Bearer ${token}` }
                });

                const data = await response.json();

                if (!response.ok) {
                    return;
                }

                const list = document.getElementById('transactionsList');
                if (data.transactions.length === 0) {
                    list.innerHTML = '<p style="text-align: center; color: #999;">No transactions yet</p>';
                    return;
                }

                list.innerHTML = data.transactions.map(t => `
                    <div class="transaction-item">
                        <div class="transaction-details">
                            <h4>${t.transaction_type}</h4>
                            <p>${new Date(t.created_at).toLocaleDateString()} - ${t.remarks || ''}</p>
                        </div>
                        <div class="transaction-amount ${t.transaction_type === 'WITHDRAW' || t.transaction_type === 'TRANSFER' ? 'debit' : 'credit'}">
                            ${t.transaction_type === 'WITHDRAW' || t.transaction_type === 'TRANSFER' ? '-' : '+'}$${t.amount.toFixed(2)}
                        </div>
                    </div>
                `).join('');
            } catch (error) {
                console.error('Error loading transactions:', error);
            }
        }

        async function transfer() {
            console.log('Transfer function called');
            const toAccount = document.getElementById('recipientAccount').value;
            const amount = parseFloat(document.getElementById('transferAmount').value);
            
            console.log('Recipient:', toAccount, 'Amount:', amount);

            if (!toAccount || !amount || amount <= 0) {
                showAlert('Please fill in all fields correctly', 'error');
                return;
            }

            try {
                const payload = { to_account: parseInt(toAccount), amount: amount };
                console.log('Sending payload:', payload);
                
                const response = await fetch(`${API_BASE}/transactions/transfer`, {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json',
                        'Authorization': `Bearer ${token}`
                    },
                    body: JSON.stringify(payload)
                });

                console.log('Response status:', response.status);
                const data = await response.json();
                console.log('Response data:', data);

                if (!response.ok) {
                    showAlert(data.message || 'Transfer failed', 'error');
                    return;
                }

                showAlert('Transfer successful!', 'success');
                document.getElementById('recipientAccount').value = '';
                document.getElementById('transferAmount').value = '';
                setTimeout(() => {
                    loadDashboard();
                }, 1500);
            } catch (error) {
                console.error('Transfer error:', error);
                showAlert('Error: ' + error.message, 'error');
            }
        }

        async function deposit() {
            console.log('Deposit function called');
            const amount = parseFloat(document.getElementById('depositAmount').value);
            console.log('Amount:', amount);

            if (!amount || amount <= 0) {
                showAlert('Please enter a valid amount', 'error');
                return;
            }

            try {
                const response = await fetch(`${API_BASE}/transactions/deposit`, {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json',
                        'Authorization': `Bearer ${token}`
                    },
                    body: JSON.stringify({ amount })
                });

                console.log('Response status:', response.status);
                const data = await response.json();
                console.log('Response data:', data);

                if (!response.ok) {
                    showAlert(data.message || 'Deposit failed', 'error');
                    return;
                }

                showAlert('Deposit successful!', 'success');
                document.getElementById('depositAmount').value = '';
                setTimeout(() => {
                    loadDashboard();
                }, 1500);
            } catch (error) {
                console.error('Deposit error:', error);
                showAlert('Error: ' + error.message, 'error');
            }
        }

        async function withdraw() {
            console.log('Withdraw function called');
            const amount = parseFloat(document.getElementById('withdrawAmount').value);
            console.log('Amount:', amount);

            if (!amount || amount <= 0) {
                showAlert('Please enter a valid amount', 'error');
                return;
            }

            try {
                const response = await fetch(`${API_BASE}/transactions/withdraw`, {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json',
                        'Authorization': `Bearer ${token}`
                    },
                    body: JSON.stringify({ amount })
                });

                console.log('Response status:', response.status);
                const data = await response.json();
                console.log('Response data:', data);

                if (!response.ok) {
                    showAlert(data.message || 'Withdrawal failed', 'error');
                    return;
                }

                showAlert('Withdrawal successful!', 'success');
                document.getElementById('withdrawAmount').value = '';
                setTimeout(() => {
                    loadDashboard();
                }, 1500);
            } catch (error) {
                console.error('Withdraw error:', error);
                showAlert('Error: ' + error.message, 'error');
            }
        }

        function switchTab(tabName) {
            console.log('Switching to tab:', tabName);
            // Hide all tabs
            document.querySelectorAll('.tab-content').forEach(tab => {
                tab.classList.remove('active');
            });
            document.querySelectorAll('.tab-btn').forEach(btn => {
                btn.classList.remove('active');
            });

            // Show selected tab
            const tabElement = document.getElementById(tabName);
            if (tabElement) {
                tabElement.classList.add('active');
            }
            
            // Mark the clicked button as active
            if (event && event.target) {
                event.target.classList.add('active');
            }

            if (tabName === 'transactions') {
                loadTransactionHistory();
            }
        }

        function logout() {
            localStorage.removeItem('token');
            token = null;
            currentUser = null;
            document.getElementById('dashboard').style.display = 'none';
            document.getElementById('loginForm').classList.remove('hidden');
            document.getElementById('loginEmail').value = '';
            document.getElementById('loginPassword').value = '';
            showAlert('Logged out successfully', 'success');
        }
    </script>
</body>
</html>
